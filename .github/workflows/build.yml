name: Build and Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore test project
        run: dotnet restore StarterApp.Test

      - name: Build test project
        run: dotnet build StarterApp.Test --no-restore

      - name: Run tests
        run: dotnet test StarterApp.Test --no-build --verbosity normal